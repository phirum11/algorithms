services:
  # --- PYTHON BACKEND API ---
  - type: web
    name: algorithms-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this manually in dashboard
      - key: PYTHON_VERSION
        value: 3.10.0

  # --- REACT FRONTEND ---
  - type: web
    name: algorithms-frontend
    runtime: static
    rootDir: algorithms
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # Input your target backend URL, e.g. https://api.best-coms.app

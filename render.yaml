services:
  # --- PYTHON BACKEND API ---
  - type: web
    name: algorithms-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set this manually in dashboard
      - key: PYTHON_VERSION
        value: 3.10.0

  # --- REACT FRONTEND ---
  - type: static
    name: algorithms-frontend
    env: static
    rootDir: algorithms
    buildCommand: npm install && npm run build
    publishDir: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: algorithms-backend
          property: url
